<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Store</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="filter-section">
        <input type="text" id="filter-input" placeholder="ფილტრი" />
      </div>

      <div class="main-content">
        <div class="products-wrapper">
          <h2>პროდუქტები</h2>
          <div class="products" id="products-container"></div>
        </div>

        <div class="cart">
          <h2>კალათა</h2>
          <ul id="cart-list"></ul>
          <div class="cart-summary">
            <p>ნივთების რაოდენობა: <span id="total-count">0</span></p>
            <p>ჯამური ფასი: <span id="total-price">0</span>₾</p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
